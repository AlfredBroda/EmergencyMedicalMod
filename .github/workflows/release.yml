# This is a basic workflow to help you get started with Actions

name: Release

# Controls when the workflow will run
on:
  push:
    tags:
      - '*' # Triggers ONLY when you push a tag (e.g., v1.0.0)

permissions:
  contents: write # Grants permission to create the release
  # Allows you to run this workflow manually from the Actions tab

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Step 1: Node-free checkout to bypass deprecation warnings completely
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Zip the contents
      - name: Archive files
        run: |
          mkdir "EmergencyMedicalMod"
          mv data EmergencyMedicalMod/
          mv images EmergencyMedicalMod/
          mv mod_info.json EmergencyMedicalMod/
          zip -r "EmergencyMedicalMod-${{ github.ref_name }}.zip" EmergencyMedicalMod bmm.nest.json

      # Step 3: Create a draft release and upload the zip file
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: EmergencyMedicalMod-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
