# This is a basic workflow to help you get started with Actions

name: Release

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Step 1: Node-free checkout to bypass deprecation warnings completely
      - name: Checkout code
        uses: taiki-e/checkout-action@v1

      # Step 2: Zip the contents
      - name: Archive repository
        run: |
          zip -r "EmergencyMedicalMod-${{ github.ref_name }}.zip" . -x "*.git*"

      # Step 3: Create a draft release and upload the zip file
      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: EmergencyMedicalMod-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
